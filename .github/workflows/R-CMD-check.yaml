name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/r-hub/containers/ubuntu-release:latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump
        if: github.event_name == 'pull_request'
        run: |
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:DESCRIPTION | grep '^Version:' | sed 's/Version: //')
          PR_VERSION=$(grep '^Version:' DESCRIPTION | sed 's/Version: //')
          CODE_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- R/ man/ src/ | head -1)
          if [ -n "$CODE_CHANGED" ] && [ "$BASE_VERSION" = "$PR_VERSION" ]; then
            echo "::error::Package code changed but version was not bumped (still $BASE_VERSION). Update Version in DESCRIPTION."
            exit 1
          fi

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::lintr, any::covr
          needs: check

      - name: Install package
        run: R CMD INSTALL .

      - name: Lint
        run: |
          lints <- lintr::lint_package()
          if (length(lints) > 0L) {
            print(lints)
            quit(status = 1)
          }
        shell: Rscript {0}

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: '"--no-manual"'
          error-on: '"warning"'

      - name: Test coverage
        run: |
          cov <- covr::package_coverage()
          pct <- covr::percent_coverage(cov)

          # Per-function breakdown
          df <- as.data.frame(cov)
          df <- df[!is.na(df$value) & !is.na(df$functions) & nzchar(df$functions), ]
          func_cov <- tapply(df$value > 0, df$functions, function(x) mean(x, na.rm = TRUE)) * 100
          func_cov <- sort(func_cov)

          # Build summary table
          rows <- paste0("| ", names(func_cov), " | ", sprintf("%.0f%%", func_cov), " |")
          if (pct >= 100) {
            badge <- sprintf(":white_check_mark: **%.1f%%** (threshold: 100%%)", pct)
          } else {
            badge <- sprintf(":x: **%.1f%%** (threshold: 100%%)", pct)
          }
          summary <- c(
            "## Test Coverage", "",
            badge, "",
            "| Function | Coverage |",
            "|----------|----------|",
            rows, ""
          )

          # Write to job summary
          cat(paste(summary, collapse = "\n"), file = Sys.getenv("GITHUB_STEP_SUMMARY"))

          # Also print to log
          cat(sprintf("Coverage: %.1f%%\n", pct))

          if (pct < 100) {
            stop(sprintf("Coverage %.1f%% is below 100%% threshold", pct))
          }
        shell: Rscript {0}
